server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: gateway-server
  main:
    web-application-type: reactive
  data:
    redis:
      ssl:
        enabled: true
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            # soccer-serviceлҠ” нҳ„мһ¬ кө¬нҳ„лҗҳм§Җ м•ҠмқҢ
            # - id: soccer-service
            #   uri: http://soccer-service:8085
            #   predicates:
            #     - Path=/soccer/**
            - id: common-service
              uri: http://common-service:8081
              predicates:
                - Path=/common/**
            - id: user-service
              uri: http://user-service:8082
              predicates:
                - Path=/user/**
              filters:
                - StripPrefix=1
            - id: diary-service
              uri: http://diary-service:8083
              predicates:
                - Path=/diary/**
              filters:
                - StripPrefix=1
            - id: calendar-service
              uri: http://calendar-service:8084
              predicates:
                - Path=/calendar/**
              filters:
                - StripPrefix=1
            # OAuth мҶҢм…ң лЎңк·ёмқё (Google, Naver, Kakao) - oauth-serviceлЎң лқјмҡ°нҢ…
            # /auth/google/auth-url -> /google/auth-url (StripPrefix=1лЎң /authл§Ң м ңкұ°)
            - id: oauth-google-service
              uri: http://oauth-service:8087
              predicates:
                - Path=/auth/google/**
              filters:
                - StripPrefix=1
            - id: oauth-naver-service
              uri: http://oauth-service:8087
              predicates:
                - Path=/auth/naver/**
              filters:
                - StripPrefix=1
            - id: oauth-kakao-service
              uri: http://oauth-service:8087
              predicates:
                - Path=/auth/kakao/**
              filters:
                - StripPrefix=1
            # JWT мқёмҰқ м„ңл№„мҠӨ (мқҙл©”мқј/л№„л°ҖлІҲнҳё лЎңк·ёмқё)
            - id: auth-service
              uri: http://auth-service:9000
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: api-auth-service
              uri: http://auth-service:9000
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
            # OAuth мҶҢм…ң лЎңк·ёмқё API кІҪлЎң (Google, Naver, Kakao) - oauth-serviceлЎң лқјмҡ°нҢ…
            # /api/google/** -> /google/** (StripPrefix=1лЎң /apiл§Ң м ңкұ°)
            - id: api-oauth-google-service
              uri: http://oauth-service:8087
              predicates:
                - Path=/api/google/**
              filters:
                - StripPrefix=1
            - id: api-oauth-naver-service
              uri: http://oauth-service:8087
              predicates:
                - Path=/api/naver/**
              filters:
                - StripPrefix=1
            - id: api-oauth-kakao-service
              uri: http://oauth-service:8087
              predicates:
                - Path=/api/kakao/**
              filters:
                - StripPrefix=1
            - id: admin-user-service
              uri: http://admin-user-service:9001
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=2
            - id: oauth2-service
              uri: http://oauth-service:8087
              predicates:
                - Path=/oauth2/**
              filters:
                - StripPrefix=1
            - id: culture-service
              uri: http://culture-service:8086
              predicates:
                - Path=/culture/**
              filters:
                - StripPrefix=1
            - id: healthcare-service
              uri: http://healthcare-service:8088
              predicates:
                - Path=/healthcare/**
              filters:
                - StripPrefix=1
            - id: account-service
              uri: http://account-service:8089
              predicates:
                - Path=/account/**
              filters:
                - StripPrefix=1
            - id: pathfinder-service
              uri: http://pathfinder-service:8090
              predicates:
                - Path=/pathfinder/**
              filters:
                - StripPrefix=1
            # AI м„ңл№„мҠӨ лқјмҡ°нҢ… (Python FastAPI)
            - id: chatbot-service
              uri: http://aihoyun-chatbot-service:9001
              predicates:
                - Path=/chatbot/**
            - id: weather-service
              uri: http://aihoyun-weather-service:9004
              predicates:
                - Path=/weather/**
            - id: crawler-service
              uri: http://aihoyun-crawler-service:9003
              predicates:
                - Path=/crawler/**
            - id: titanic-service
              uri: http://aihoyun-titanic-service:9003
              predicates:
                - Path=/titanic/**
              filters:
                - StripPrefix=1
            - id: inventory-service
              uri: http://inventory-service:9002
              predicates:
                - Path=/inventory/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:3001"
                  - "http://localhost:4000"  # admin.aiion.site
                  - "http://localhost:5000"  # www.study.site
                  - "http://frontend:3000"
                  - "http://127.0.0.1:3000"
                  - "http://127.0.0.1:4000"  # admin.aiion.site
                  - "http://127.0.0.1:5000"  # www.study.site
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowedHeaders:
                  - "*"
                allowCredentials: true
                exposedHeaders:
                  - "Content-Type"
                  - "Authorization"
                  - "X-Total-Count"
                maxAge: 3600

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    gateway:
      access: unrestricted
