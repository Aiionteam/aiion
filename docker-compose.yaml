      - SPRING_DATA_REDIS_PORT=${UPSTASH_REDIS_PORT}
      - SPRING_DATA_REDIS_PASSWORD=${UPSTASH_REDIS_PASSWORD}
      - SPRING_DATA_REDIS_SSL_ENABLED=true

  auth-service:
