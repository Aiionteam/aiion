server:
  port: 8090

spring:
  application:
    name: pathfinder-service
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/aidb
    username: aiion
    password: aiion4man
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1
      validation-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # FK 제약조건 자동 생성 설정
        hbm2ddl:
          jdbc_metadata_extraction_strategy: individually
    generate-ddl: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# CSV 초기화 설정
csv:
  init:
    enabled: ${CSV_INIT_ENABLED:true}  # 환경 변수로 제어 가능 (기본값: true)
    min-count: ${CSV_INIT_MIN_COUNT:100}  # 최소 데이터 개수 기준 (이 개수 이상이면 중복으로 간주)

